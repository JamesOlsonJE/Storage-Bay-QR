<!doctype html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Storage Bay QR</title>

  <style>

    body{
        font-family: Arial, Helvetica, sans-serif;
        margin:20px;
        text-align:center;
        font-size:20px;
        background:#f5f5f5;
    }

    h1{
        font-size:34px;
        margin-bottom:10px;
    }

    h2{
        font-size:42px;
        margin:10px 0;
    }

    h3{
        font-size:26px;
        margin-top:30px;
    }

    #currentAssignment{
        background:white;
        border:1px solid #ccc;
        border-radius:10px;
        padding:20px;
        font-size:26px;
        min-height:70px;
    }

    select{
        width:100%;
        font-size:22px;
        padding:14px;
        border-radius:8px;
    }

    button{
        width:100%;
        padding:18px;
        font-size:24px;
        font-weight:bold;
        background:#0b66c3;
        color:white;
        border:none;
        border-radius:8px;
    }

    #clearBtn{
    background:#b22222;
}

    button:active{
        opacity:.8;
    }

  </style>

</head>
<body>

<h1>Storage Bay</h1>

<h2 id="locationTitle">Location Loading...</h2>

<h3>Currently Assigned</h3>
<div id="currentAssignment">
    Loading...
</div>

<br>

<h3>Change Assignment</h3>

<select id="projectSelect">
    <option>Loading projects...</option>
</select>

<br><br>

<button id="updateBtn">Update Assignment</button>

<br><br>

<button id="clearBtn">Clear Assignment</button>

<script>
const params = new URLSearchParams(window.location.search);
const loc = params.get("loc") || "UNKNOWN";

document.getElementById("locationTitle").textContent =
    "Location " + loc;

fetch("locations.json?v=" + Date.now())
    .then(r => r.json())
    .then(locations => {
        const currentBox = document.getElementById("currentAssignment");
        const match = locations.find(x => x.location_code === loc);

        if (!match || !match.project_number) {
            currentBox.innerHTML = "Available";
            return;
        }

        currentBox.innerHTML =
            "<strong>" + match.project_name + "</strong><br>" +
            match.project_number;
    })
    .catch(() => {
        document.getElementById("currentAssignment").innerHTML =
            "Current assignment unavailable";
    });

fetch("projects.json?v=" + Date.now())
    .then(r => r.json())
    .then(projects => {
        const ddl = document.getElementById("projectSelect");
        ddl.innerHTML = "";

        projects.forEach(p => {
            const opt = document.createElement("option");
            opt.value = p.project_number;
            opt.textContent = p.display_text;
            ddl.appendChild(opt);
        });
    });

document.getElementById("updateBtn").addEventListener("click", () => {
    const projectNumber = document.getElementById("projectSelect").value;

    const updateUrl =
        "https://storage.janney-electric.com/storagebay/?loc=" +
        encodeURIComponent(loc) +
        "&project=" +
        encodeURIComponent(projectNumber);

    window.location.href = updateUrl;
});

  document.getElementById("clearBtn").addEventListener("click", () => {
    const clearUrl =
        "https://storage.janney-electric.com/storagebay/?loc=" +
        encodeURIComponent(loc) +
        "&project=";

    window.location.href = clearUrl;
});
</script>

</body>
</html>
