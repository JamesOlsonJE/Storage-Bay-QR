<!doctype html>
<html>
<head>
  <title>Storage Bay QR</title>
</head>
<body>

<h1>Storage Bay QR</h1>

<h2 id="locationTitle">Location: Loading...</h2>

<label>Assign Project:</label><br>

<select id="projectSelect">
    <option>Loading projects...</option>
</select>

<br><br>

<label>Notes:</label><br>
<textarea id="notes" rows="4" cols="50"></textarea>

<br><br>

<button disabled>Submit (Coming Soon)</button>

<script>

const params = new URLSearchParams(window.location.search);
const loc = params.get("loc") || "UNKNOWN";

document.getElementById("locationTitle").textContent =
    "Location: " + loc;

fetch("projects.json")
    .then(r => r.json())
    .then(projects => {

        const ddl = document.getElementById("projectSelect");
        ddl.innerHTML = "";

        projects.forEach(p => {

            const opt = document.createElement("option");
            opt.value = p.project_number;
            opt.textContent = p.display_text;

            ddl.appendChild(opt);

        });

    });

</script>

</body>
</html>
